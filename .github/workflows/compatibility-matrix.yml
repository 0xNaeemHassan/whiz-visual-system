name: Export Compatibility Matrix

on:
  pull_request:
  push:
    branches: [main]

jobs:
  export-compatibility:
    name: ${{ matrix.os }} / node-${{ matrix.node }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        node: [20, 22]

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm ci
      - name: Run export compatibility matrix checks
        run: npm run test:export-compat
