name: e2e-browser-journeys

on:
  pull_request:
  push:
    branches: [main]

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright@1.54.1 install --with-deps chromium

      - name: Run browser E2E (with retry)
        run: npx playwright@1.54.1 test --config=playwright.config.js --reporter=line

      - name: Quarantine unstable specs (non-blocking)
        if: failure()
        continue-on-error: true
        run: |
          npx playwright@1.54.1 test --config=playwright.config.js --grep @quarantine --retries=3 --reporter=line

      - name: Upload failure artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-failure-artifacts
          path: |
            playwright-report/**
            test-results/**
          if-no-files-found: warn
