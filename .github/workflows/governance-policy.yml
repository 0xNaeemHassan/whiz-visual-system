name: Governance Policy Checks

on:
  pull_request:
  push:
    branches:
      - main
  schedule:
    - cron: '0 8 * * 1'

jobs:
  governance-artifacts:
    name: Governance Artifacts Freshness
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: node scripts/check-governance-artifacts.mjs
