name: Import Domain Hardening

on:
  pull_request:
    paths:
      - 'src/domain/import/**'
      - 'src/domain/**'
      - 'scripts/test-import-hardening.mjs'
      - 'package.json'
      - '.github/workflows/import-domain-hardening.yml'

jobs:
  import-domain-hardening:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run test:import-hardening
